name: floodwatchapp
description: FloodWatch App - Predict, Monitor, and Report Urban Flooding in Thiruvananthapuram
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.8.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  provider: ^6.1.2

  # Maps
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  google_maps_flutter: ^2.9.0
  flutter_polyline_points: ^2.1.0

  # Location
  geolocator: ^13.0.1

  # HTTP
  http: ^1.2.0

  # Firebase
  firebase_core: ^3.4.0
  firebase_auth: ^5.7.0
  cloud_firestore: ^5.4.0
  firebase_storage: ^12.3.0

  # UI
  cupertino_icons: ^1.0.8
  dotted_border: ^2.1.0
  lottie: ^3.1.2
  google_fonts: ^6.2.1
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
